# Netlify configuration for Next.js (SSR + static assets)
[build]
  command = "npm run build"
  publish = ".next"

# Use Netlify's official Next.js runtime
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Optional: set Node version if needed
# [build.environment]
#   NODE_VERSION = "18"

# If you later use next export, change publish to "out"
# and remove the Next.js plugin.

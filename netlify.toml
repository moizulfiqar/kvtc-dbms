# Netlify configuration for Next.js (SSR + static assets)
[build]
  command = "npm run build"
  # Don't specify publish directory when using @netlify/plugin-nextjs

# Use Netlify's official Next.js runtime
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Set Node version for Next.js 15
[build.environment]
  NODE_VERSION = "20"

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back - Login</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Load shared Supabase config from public/KVTC -->
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .login-title {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 16px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #1e3a8a;
        }

        .sign-in-btn {
            width: 100%;
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .sign-in-btn:hover {
            background-color: #1e3a8a;
        }

        .sign-in-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .divider {
            color: #999;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .signup-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 40px;
        }

        .signup-link {
            color: #1e3a8a;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            color: #64748b;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #1e3a8a;
        }

        .progress-dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ddd;
            transition: background-color 0.3s ease;
        }

        .progress-dot.active {
            background-color: #1e3a8a;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .loading {
            display: none;
            margin-top: 10px;
            color: #666;
        }

        /* Forgot Password Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 400px;
            width: 90%;
            animation: modalFadeIn 0.3s ease-out;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-title {
            font-size: 28px;
            font-weight: 600;
            color: #2c3e50;
            text-align: center;
            margin-bottom: 10px;
        }

        .modal-subtitle {
            font-size: 16px;
            color: #7f8c8d;
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-actions {
            text-align: center;
            margin-bottom: 20px;
        }

        .continue-modal-btn {
            background-color: #1e3a8a;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .continue-modal-btn:hover:not(:disabled) {
            background-color: #1e40af;
        }

        .success-message {
            color: #10b981;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 10px;
            }

            .login-title {
                font-size: 28px;
            }
        }

        @media (max-width: 414px) {
            body {
                padding: 15px;
            }

            .login-container {
                padding: 25px 18px;
                margin: 5px;
                border-radius: 8px;
            }

            .login-title {
                font-size: 26px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-label {
                font-size: 15px;
                margin-bottom: 6px;
            }

            .form-input {
                padding: 14px 16px;
                font-size: 15px;
                border-radius: 6px;
            }

            .sign-in-btn {
                padding: 16px 20px;
                font-size: 15px;
                border-radius: 6px;
                margin-bottom: 18px;
            }

            .divider {
                font-size: 15px;
                margin-bottom: 18px;
            }

            .signup-text {
                font-size: 15px;
                margin-bottom: 35px;
            }

            .progress-dot {
                width: 6px;
                height: 6px;
            }
        }

        @media (max-width: 360px) {
            .login-container {
                padding: 20px 15px;
                margin: 2px;
            }

            .login-title {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .form-input {
                padding: 12px 14px;
                font-size: 14px;
            }

            .sign-in-btn {
                padding: 14px 18px;
                font-size: 14px;
            }

            .signup-text,
            .divider {
                font-size: 14px;
            }

            .form-label {
                font-size: 14px;
            }
        }

        /* Landscape orientation adjustments */
        @media (max-width: 768px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .login-container {
                max-width: 500px;
                padding: 25px 30px;
            }

            .login-title {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .form-group {
                margin-bottom: 24px;
            }

            .progress-dots {
                margin-top: 20px;
            }
        }
    </style>

    <!-- Mobile UI Override to Reduce Density -->
    <style>
        @media (max-width: 768px) {
            /* Layout & Breathing Room */
            .header { padding: 20px 24px !important; gap: 20px !important; }
            .nav-section { gap: 24px !important; margin-top: 8px !important; }
            .main-content { padding: 50px 24px !important; }
            .sidebar { padding: 24px !important; margin-bottom: 24px !important; border-radius: 12px !important; }
            .main-dashboard { padding: 24px !important; }
            
            /* Gaps & Margins */
            .stats-grid { gap: 24px !important; margin-bottom: 32px !important; }
            .stat-card { padding: 24px !important; border-radius: 16px !important; }
            .dashboard-header { margin-bottom: 32px !important; flex-direction: column !important; gap: 24px !important; }
            .filter-section { gap: 16px !important; margin-bottom: 24px !important;}
            
            /* Typography & Line Heights */
            .main-heading { font-size: 32px !important; line-height: 1.4 !important; margin-bottom: 24px !important; }
            .subtitle { font-size: 16px !important; line-height: 1.6 !important; margin-bottom: 40px !important; }
            
            /* Tables Data */
            .data-table { font-size: 15px !important; }
            .data-table th { padding: 18px 16px !important; font-size: 14px !important; letter-spacing: 0.5px !important; }
            .data-table td { padding: 18px 16px !important; }
            td .action-btn { padding: 10px 14px !important; font-size: 14px !important; margin: 4px !important;}
            
            /* Inputs & Buttons - Bigger Touch Targets */
            .primary-btn, .search-btn { padding: 16px 24px !important; font-size: 16px !important; border-radius: 10px !important; }
            .form-input, .form-select { padding: 16px 20px !important; font-size: 16px !important; border-radius: 10px !important; margin-bottom: 8px !important; }
            
            
            /* Fix Search Bar to be inline and standard */
            .search-container { flex-direction: row !important; border-radius: 12px !important; padding: 0 !important; margin-bottom: 8px !important; align-items: center !important;}
            .search-icon { margin-left: 16px !important; margin-bottom: 0 !important; width: 20px !important; height: 20px !important; }
            .search-input { margin-bottom: 0 !important; border-radius: 0 !important; padding: 16px 12px !important; flex: 1 !important; width: auto !important; }
            .search-btn { width: auto !important; border-radius: 0 12px 12px 0 !important; padding: 16px 20px !important; margin: 0 !important; }
    
            /* Modals - Spacious Flow */
            .modal-container { margin: 24px !important; padding: 40px 24px !important; border-radius: 20px !important; }
            .modal-title { font-size: 26px !important; margin-bottom: 16px !important; line-height: 1.3 !important; }
            .modal-subtitle { font-size: 16px !important; margin-bottom: 32px !important; line-height: 1.5 !important; }
            .form-group, .edit-form-group { margin-bottom: 28px !important; }
            .edit-form-label { font-size: 15px !important; margin-bottom: 10px !important;}
            .role-cards-modal { gap: 24px !important; flex-direction: column !important; }
            .role-card-modal { width: 100% !important; max-width: none !important; padding: 28px !important; border-radius: 16px !important;}
            .continue-modal-btn { padding: 18px 24px !important; font-size: 18px !important; border-radius: 12px !important; margin-top: 10px !important;}
            
            /* List Items & Rows */
            .result-item { padding: 24px !important; gap: 20px !important; border-radius: 16px !important;}
            .student-avatar { width: 80px !important; height: 80px !important; margin-bottom: 8px !important;}
            
            /* Student Details Modal specifically */
            .student-detail-header { padding: 32px 24px !important; }
            .student-detail-content { padding: 32px 24px !important; }
            .info-item { padding: 20px 24px !important; margin-bottom: 16px !important; border-radius: 12px !important;}
            .report-card { padding: 24px !important; margin-bottom: 16px !important; border-radius: 12px !important;}
            
            /* Role Selection Standalone */
            .role-cards { flex-direction: column !important; gap: 24px !important;}
            .role-card { width: 100% !important; max-width: 300px !important; padding: 32px !important; }
            .container { padding: 40px 24px !important; margin: 24px !important; }
        }

        @media (max-width: 480px) {
            .main-content { padding: 40px 20px !important; }
            .header { padding: 16px 20px !important; }
            .main-heading { font-size: 28px !important; }
            .modal-container { padding: 32px 20px !important; margin: 16px !important;}
            .role-card-modal, .role-card { padding: 24px !important; }
            .stats-grid { gap: 16px !important; }
        }
    </style>
</head>


<body>
    <div class="login-container" id="loginContainer">
        <a href="home.html" class="back-link">← Back</a>
        <h1 class="login-title">Welcome Back!</h1>

        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required>
                <div style="text-align: right; margin-top: 5px;">
                    <a href="#" onclick="openForgotPasswordModal(); return false;"
                        style="color: #1e3a8a; text-decoration: none; font-size: 14px;">Forgot Password?</a>
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <button type="submit" class="sign-in-btn" id="loginBtn">
                <span id="btnText">Sign In</span>
                <span id="loadingText" class="loading">Signing in...</span>
            </button>
        </form>

        <div class="divider">or</div>

        <p class="signup-text">
            Don't have an account? <a href="signup.html" class="signup-link">Sign Up</a>
        </p>


        <div class="progress-dots">
            <div class="progress-dot"></div>
            <div class="progress-dot active"></div>
        </div>
    </div>

    <!-- Set new password (shown when user arrives from reset link) -->
    <div class="login-container" id="setNewPasswordContainer" style="display: none;">
        <h1 class="login-title">Set new password</h1>
        <p style="color: #555; margin-bottom: 24px; font-size: 15px;">Enter your new password below.</p>
        <form id="setNewPasswordForm">
            <div class="form-group">
                <label for="newPassword" class="form-label">New password</label>
                <input type="password" id="newPassword" class="form-input" required minlength="6"
                    placeholder="At least 6 characters">
                <div class="error-message" id="newPasswordError"></div>
            </div>
            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm password</label>
                <input type="password" id="confirmPassword" class="form-input" required minlength="6"
                    placeholder="Re-enter password">
                <div class="error-message" id="confirmPasswordError"></div>
            </div>
            <button type="submit" class="sign-in-btn" id="setPasswordBtn">
                <span id="setPasswordBtnText">Update password</span>
                <span id="setPasswordLoading" class="loading" style="display: none;">Updating...</span>
            </button>
        </form>
    </div>

    <script>
        // Initialize Supabase client (avoid clashing with global `supabase`)
        let supabaseClient = null;
        if (window.supabase && window.SUPABASE_CONFIG) {
            try {
                supabaseClient = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.anonKey
                );
            } catch (e) {
                console.error('Supabase init failed on login page:', e);
            }
        } else {
            console.warn('Supabase not configured on login page. Check ../../public/KVTC/config.js path.');
        }

        // Check if user landed here from password reset link (hash has type=recovery)
        function isRecoveryMode() {
            const hash = window.location.hash || '';
            return hash.includes('type=recovery');
        }

        // Get the selected role from localStorage (skip redirect if we're in password recovery)
        const selectedRole = localStorage.getItem('selectedRole');
        if (isRecoveryMode()) {
            // User clicked "Reset Password" in email — show set-new-password form, don't redirect
            document.addEventListener('DOMContentLoaded', function () {
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('setNewPasswordContainer').style.display = 'block';
            });
        } else if (selectedRole) { console.log("User selected role:", selectedRole); } // Redirect removed to allow password recovery directly.

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Clear previous error messages
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.style.display = 'none';
                msg.textContent = '';
            });

            if (email && password) {
                // Check if role is selected
                if (!selectedRole) {
                    showError('emailError', 'Please select a role first. Redirecting to home...');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 2000);
                    return;
                }

                // Validate role
                if (!isValidRole(selectedRole)) {
                    showError('emailError', 'Invalid role selected. Please select a valid role.');
                    return;
                }

                await handleLogin(email, password);
            } else {
                showError('emailError', 'Please fill in all fields');
            }
        });

        async function handleLogin(email, password) {
            if (!supabaseClient) {
                showError('emailError', 'Database not connected. Please try again later.');
                return;
            }
            const loginBtn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const loadingText = document.getElementById('loadingText');

            // Show loading state
            loginBtn.disabled = true;
            btnText.style.display = 'none';
            loadingText.style.display = 'inline';

            try {
                // Sign in with Supabase
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) {
                    throw new Error(authError.message);
                }

                if (authData.user) {
                    // Get user profile from User table
                    const { data: userProfile, error: profileError } = await supabaseClient
                        .from('User')
                        .select('*')
                        .eq('id', authData.user.id)
                        .single();

                    if (profileError) {
                        console.error('Error fetching user profile:', profileError);
                        throw new Error('Error retrieving user profile. Please try again.');
                    }

                    if (!userProfile) {
                        throw new Error('User profile not found. Please contact administrator.');
                    }

                    // SECURITY CHECK: Validate that selected role matches stored role (employee = staff)
                    const actualRole = userProfile.role;
                    const roleMatches = (selectedRole === actualRole) || (selectedRole === 'staff' && actualRole === 'employee');
                    if (!roleMatches) {
                        throw new Error(`Access denied. You are registered as ${actualRole}, but selected ${selectedRole}. Please select the correct role.`);
                    }

                    // Success! User's selected role matches their stored role
                    alert(`Login successful!\nWelcome ${email}\nRole: ${actualRole}`);

                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userId', authData.user.id);
                    localStorage.setItem('userRole', actualRole);
                    localStorage.setItem('selectedRole', selectedRole);
                    localStorage.setItem('isAuthenticated', 'true');

                    // Redirect based on selected role: admin -> admin dashboard, staff -> staff dashboard
                    if (selectedRole === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'staff-dashboard.html';
                    }
                }

            } catch (error) {
                console.error('Login error:', error);
                showError('emailError', error.message || 'Invalid email or password. Please try again.');

                // Reset button state
                loginBtn.disabled = false;
                btnText.style.display = 'inline';
                loadingText.style.display = 'none';
            }
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function isValidRole(role) {
            return role === 'admin' || role === 'staff';
        }

        function continuePage() {
            console.log('Continue button clicked');
            alert('Continue to next page');
            // Here you would navigate to the next page
        }

        // Handle sign up link
        document.querySelector('.signup-link').addEventListener('click', function (e) {
            console.log('Sign up link clicked');
            // Link will navigate naturally to signup.html
        });

        // Forgot Password Functions
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'flex';
        }

        function closeForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetEmailError').style.display = 'none';
            document.getElementById('resetSuccess').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('forgotPasswordForm');
            if (!form) return;
            form.addEventListener('submit', async function (e) {
                e.preventDefault();

                const email = document.getElementById('resetEmail').value;
                const errorElement = document.getElementById('resetEmailError');
                const successElement = document.getElementById('resetSuccess');

                // Clear previous messages
                errorElement.style.display = 'none';
                successElement.style.display = 'none';

                try {
                    if (!supabaseClient) {
                        throw new Error('Database not connected. Please try again later.');
                    }

                    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                        redirectTo: window.location.origin + '/KVTC/login.html'
                    });

                    if (error) {
                        throw error;
                    }

                    successElement.style.display = 'block';
                    setTimeout(() => {
                        closeForgotPasswordModal();
                    }, 3000);

                } catch (error) {
                    errorElement.textContent = error.message || 'Error sending reset email. Please try again.';
                    errorElement.style.display = 'block';
                }
            });
        });

        // Set new password (when user lands from reset link with type=recovery in hash)
        document.addEventListener('DOMContentLoaded', function () {
            const setForm = document.getElementById('setNewPasswordForm');
            if (!setForm) return;
            setForm.addEventListener('submit', async function (e) {
                e.preventDefault();
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const errorEl = document.getElementById('newPasswordError');
                const confirmErrorEl = document.getElementById('confirmPasswordError');
                errorEl.style.display = 'none';
                errorEl.textContent = '';
                confirmErrorEl.style.display = 'none';
                confirmErrorEl.textContent = '';

                if (newPassword.length < 6) {
                    errorEl.textContent = 'Password must be at least 6 characters.';
                    errorEl.style.display = 'block';
                    return;
                }
                if (newPassword !== confirmPassword) {
                    confirmErrorEl.textContent = 'Passwords do not match.';
                    confirmErrorEl.style.display = 'block';
                    return;
                }

                const btn = document.getElementById('setPasswordBtn');
                const btnText = document.getElementById('setPasswordBtnText');
                const loadingText = document.getElementById('setPasswordLoading');
                btn.disabled = true;
                btnText.style.display = 'none';
                loadingText.style.display = 'inline';

                try {
                    if (!supabaseClient) throw new Error('Database not connected.');
                    const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
                    if (error) throw error;
                    // Success: clear hash and show login again
                    window.history.replaceState(null, '', window.location.pathname + window.location.search);
                    document.getElementById('setNewPasswordContainer').style.display = 'none';
                    document.getElementById('loginContainer').style.display = 'block';
                    alert('Password updated. You can now sign in with your new password.');
                } catch (err) {
                    errorEl.textContent = err.message || 'Failed to update password. Try again.';
                    errorEl.style.display = 'block';
                } finally {
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    loadingText.style.display = 'none';
                }
            });
        });
    </script>

    <!-- Forgot Password Modal -->
    <div class="modal-overlay" id="forgotPasswordModal" style="display: none;">
        <div class="modal-container">
            <h2 class="modal-title">Reset Password</h2>
            <p class="modal-subtitle">Enter your email to receive a password reset link</p>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetEmail" class="form-label">Email</label>
                    <input type="email" id="resetEmail" class="form-input" required>
                    <div class="error-message" id="resetEmailError"></div>
                    <div class="success-message" id="resetSuccess">Password reset email sent! Check your inbox.</div>
                </div>

                <div class="modal-actions">
                    <button type="submit" class="continue-modal-btn">Send Reset Link</button>
                    <button type="button" class="continue-modal-btn" onclick="closeForgotPasswordModal()"
                        style="background: #94a3b8; margin-top: 10px;">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account - Sign Up</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Use correct relative path so this resolves from /pages/KVTC/signup.html -->
    <script src="config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .signup-title {
            font-size: 32px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            font-size: 16px;
            color: #555;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: #065f46;
        }

        .sign-up-btn {
            width: 100%;
            background-color: #065f46;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }

        .sign-up-btn:hover {
            background-color: #059669;
        }

        .sign-up-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .divider {
            color: #999;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .signin-text {
            color: #666;
            font-size: 16px;
        }

        .signin-link {
            color: #065f46;
            text-decoration: none;
            font-weight: 600;
        }

        .signin-link:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            color: #64748b;
            font-size: 14px;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .back-link:hover {
            color: #1e3a8a;
        }

        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .password-hint {
            color: #64748b;
            font-size: 12px;
            margin-top: 6px;
            line-height: 1.4;
        }

        .success-message {
            color: #27ae60;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }

        .loading {
            display: none;
            margin-top: 10px;
            color: #666;
        }

        @media (max-width: 480px) {
            .signup-container {
                padding: 30px 20px;
                margin: 10px;
            }

            .signup-title {
                font-size: 28px;
            }
        }

        @media (max-width: 414px) {
            body {
                padding: 15px;
            }

            .signup-container {
                padding: 25px 18px;
                margin: 5px;
                border-radius: 8px;
            }

            .signup-title {
                font-size: 26px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 18px;
            }

            .form-label {
                font-size: 15px;
                margin-bottom: 6px;
            }

            .form-input {
                padding: 14px 16px;
                font-size: 15px;
                border-radius: 6px;
            }

            .sign-up-btn {
                padding: 16px 20px;
                font-size: 15px;
                border-radius: 6px;
                margin-bottom: 18px;
            }

            .divider {
                font-size: 15px;
                margin-bottom: 18px;
            }

            .signin-text {
                font-size: 15px;
            }
        }

        @media (max-width: 360px) {
            .signup-container {
                padding: 20px 15px;
                margin: 2px;
            }

            .signup-title {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .form-input {
                padding: 12px 14px;
                font-size: 14px;
            }

            .sign-up-btn {
                padding: 14px 18px;
                font-size: 14px;
            }

            .signin-text,
            .divider {
                font-size: 14px;
            }

            .form-label {
                font-size: 14px;
            }
        }

        /* Landscape orientation adjustments */
        @media (max-width: 768px) and (orientation: landscape) {
            body {
                padding: 10px;
            }

            .signup-container {
                max-width: 500px;
                padding: 25px 30px;
            }

            .signup-title {
                font-size: 24px;
                margin-bottom: 25px;
            }

            .form-group {
                margin-bottom: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="signup-container">
        <a href="login.html" class="back-link">← Back</a>
        <h1 class="signup-title">Create an Account</h1>

        <form id="signupForm">
            <div class="form-group">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" name="fullName" class="form-input" required
                    placeholder="Enter your full name">
                <div class="error-message" id="fullNameError"></div>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-input" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" required minlength="8"
                    autocomplete="new-password">
                <div class="password-hint" id="passwordHint">At least 8 characters, 1 uppercase, 1 lowercase, 1 number,
                    1 special character (!@#$%^&*)</div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required>
                <div class="error-message" id="confirmPasswordError"></div>
            </div>

            <button type="submit" class="sign-up-btn" id="signupBtn">
                <span id="btnText">Sign Up</span>
                <span id="loadingText" class="loading">Creating account...</span>
            </button>
        </form>

        <div class="divider">or</div>

        <p class="signin-text">
            Already have an account? <a href="login.html" class="signin-link">Sign In</a>
        </p>
    </div>

    <script>
        // Initialize Supabase client (avoid clashing with global `supabase`)
        let supabaseClient = null;
        if (window.supabase && window.SUPABASE_CONFIG) {
            try {
                supabaseClient = window.supabase.createClient(
                    window.SUPABASE_CONFIG.url,
                    window.SUPABASE_CONFIG.anonKey
                );
            } catch (e) {
                console.error('Supabase init failed:', e);
            }
        } else {
            console.warn('Supabase not configured: check that ../../public/KVTC/config.js is served correctly.');
        }

        // Get the selected role from localStorage
        const selectedRole = localStorage.getItem('selectedRole');
        if (selectedRole) {
            console.log('User selected role:', selectedRole);
        } else {
            console.log('No role selected, redirecting to role selection');
            window.location.href = 'home.html';
        }

        document.getElementById('signupForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Clear previous error messages
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.style.display = 'none';
                msg.textContent = '';
            });

            let isValid = true;

            if (!fullName) {
                showError('fullNameError', 'Full name is required');
                isValid = false;
            }

            // Validate email
            if (!email) {
                showError('emailError', 'Email is required');
                isValid = false;
            } else {
                const emailErr = validateEmail(email);
                if (emailErr) {
                    showError('emailError', emailErr);
                    isValid = false;
                }
            }

            // Validate password
            if (!password) {
                showError('passwordError', 'Password is required');
                isValid = false;
            } else {
                const pwdErr = validatePassword(password);
                if (pwdErr) {
                    showError('passwordError', pwdErr);
                    isValid = false;
                }
            }

            // Validate confirm password
            if (!confirmPassword) {
                showError('confirmPasswordError', 'Please confirm your password');
                isValid = false;
            } else if (password !== confirmPassword) {
                showError('confirmPasswordError', 'Passwords do not match');
                isValid = false;
            }

            if (isValid) {
                // Check if role is selected
                if (!selectedRole) {
                    showError('emailError', 'Please select a role first. Redirecting to role selection...');
                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 2000);
                    return;
                }

                // Validate role
                if (!isValidRole(selectedRole)) {
                    showError('emailError', 'Invalid role selected. Please select a valid role.');
                    return;
                }

                await handleSignup(fullName, email, password, selectedRole);
            }
        });

        async function handleSignup(fullName, email, password, role) {
            if (!supabaseClient) {
                showError('emailError', 'Database not connected. Please try again later.');
                return;
            }
            const signupBtn = document.getElementById('signupBtn');
            const btnText = document.getElementById('btnText');
            const loadingText = document.getElementById('loadingText');

            // Show loading state
            signupBtn.disabled = true;
            btnText.style.display = 'none';
            loadingText.style.display = 'inline';

            try {
                // Step 1: Create user in Supabase Auth with role metadata
                const { data: authData, error: authError } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            role: role
                        }
                    }
                });

                if (authError) {
                    throw new Error(authError.message);
                }

                if (authData.user) {
                    console.log('User created in auth, now creating profile...');
                    console.log('User ID:', authData.user.id);
                    console.log('Selected role:', role);
                    console.log('Auth data:', authData);

                    // Wait a moment for authentication to fully process
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    // Check current session before inserting
                    const { data: session, error: sessionError } = await supabaseClient.auth.getSession();
                    console.log('Current session:', session);
                    console.log('Session error:', sessionError);

                    // Step 2: Insert user data into the User table
                    console.log('Attempting to insert profile into User table...');
                    const dbRole = role === 'staff' ? 'employee' : role;
                    const { data: profileData, error: profileError } = await supabaseClient
                        .from('User')
                        .insert([
                            {
                                id: authData.user.id,
                                role: dbRole,
                                name: fullName,
                                email: email
                            }
                        ])
                        .select();

                    // Debug output exactly as you suggested
                    console.log('PROFILE DATA:', profileData);
                    console.log('PROFILE ERROR:', profileError);

                    if (profileError) {
                        console.error('Error creating user profile:', profileError);
                        console.error('Profile error details:', JSON.stringify(profileError, null, 2));
                        console.error('Error code:', profileError.code);
                        console.error('Error hint:', profileError.hint);

                        // This is a critical error - profile creation failed
                        throw new Error(`Failed to create user profile: ${profileError.message}. Please try again or contact support.`);
                    }

                    console.log('User profile created successfully:', profileData);

                    // Success!
                    alert(`Account created successfully!\nRole: ${role}\nEmail: ${email}\nPlease check your email to verify your account.`);

                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userId', authData.user.id);
                    localStorage.setItem('userRole', role);
                    localStorage.setItem('selectedRole', role);
                    localStorage.setItem('isAuthenticated', 'true');

                    // Redirect based on selected role: admin -> admin dashboard, staff -> staff dashboard
                    if (role === 'admin') {
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        window.location.href = 'staff-dashboard.html';
                    }
                }

            } catch (error) {
                console.error('Signup error:', error);
                showError('emailError', error.message || 'An error occurred during signup. Please try again.');

                // Reset button state
                signupBtn.disabled = false;
                btnText.style.display = 'inline';
                loadingText.style.display = 'none';
            }
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function validateEmail(email) {
            const trimmed = email.trim();
            if (!trimmed) return 'Email is required';
            // RFC-style: local@domain.tld, no spaces, valid structure
            const emailRegex = /^[a-zA-Z0-9.!#$%&'*+/=?^_`{|}~-]+@[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(?:\.[a-zA-Z0-9](?:[a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)*\.[a-zA-Z]{2,}$/;
            if (!emailRegex.test(trimmed)) return 'Please enter a valid email address (e.g. name@example.com)';
            if (trimmed.length > 254) return 'Email is too long';
            return null;
        }

        function validatePassword(password) {
            if (password.length < 8) return 'Password must be at least 8 characters long';
            if (!/[A-Z]/.test(password)) return 'Password must contain at least one uppercase letter';
            if (!/[a-z]/.test(password)) return 'Password must contain at least one lowercase letter';
            if (!/[0-9]/.test(password)) return 'Password must contain at least one number';
            if (!/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) return 'Password must contain at least one special character (!@#$%^&* etc.)';
            return null;
        }

        function isValidRole(role) {
            return role === 'admin' || role === 'staff';
        }

        // Handle sign in link
        document.querySelector('.signin-link').addEventListener('click', function (e) {
            console.log('Sign in link clicked');
            // Link will navigate naturally to login.html
        });
    </script>
</body>

</html>
